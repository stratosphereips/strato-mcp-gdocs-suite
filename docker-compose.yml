services:
  auth:
    build: .
    image: google-docs-mcp:latest
    command: auth
    ports:
      - "8082:8082"
    env_file: .env
    environment:
      TOKEN_STORE_PATH: /tokens
    volumes:
      - tokens:/tokens

  mcp:
    build: .
    image: google-docs-mcp:latest
    command: serve
    stdin_open: true
    env_file: .env
    environment:
      TOKEN_STORE_PATH: /tokens
    volumes:
      - tokens:/tokens

volumes:
  tokens:
    name: google-docs-mcp-tokens
